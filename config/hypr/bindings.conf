# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(sublingual-os-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(sublingual-os-cmd-terminal-cwd)" bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, sublingual-os-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, uwsm-app -- nautilus --new-window "$(sublingual-os-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, sublingual-os-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, sublingual-os-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, sublingual-os-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, sublingual-os-launch-editor
bindd = SUPER SHIFT, D, Docker, exec, sublingual-os-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, sublingual-os-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, sublingual-os-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, sublingual-os-launch-webapp "https://chatgpt.com"
bindd = SUPER SHIFT ALT, A, Grok, exec, sublingual-os-launch-webapp "https://grok.com"
bindd = SUPER SHIFT, C, Calendar, exec, sublingual-os-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, sublingual-os-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, sublingual-os-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, sublingual-os-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, sublingual-os-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, sublingual-os-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, sublingual-os-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, sublingual-os-launch-webapp "https://x.com/compose/post"

# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Sublingual OS Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Sublingual OS menu, exec, sublingual-os-menu

